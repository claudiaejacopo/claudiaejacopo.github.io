<link rel="stylesheet" href="css/theme.css">
<style>
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    display: inline-block;
    vertical-align: middle;
  }

  @keyframes subtleFloat {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
  }

  @keyframes gentlePulse {
    0% { opacity: 0.8; }
    50% { opacity: 1; }
    100% { opacity: 0.8; }
  }

  @keyframes fadeInScale {
    0% { opacity: 0; transform: scale(0.98); }
    100% { opacity: 1; transform: scale(1); }
  }

  .animate-float {
    animation: subtleFloat 6s ease-in-out infinite;
  }

  .animate-float-delayed {
    animation: subtleFloat 8s ease-in-out infinite 1s;
  }

  .animate-pulse-slow {
    animation: gentlePulse 4s ease-in-out infinite;
  }

  .animate-entrance {
    animation: fadeInScale 2.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  .page-transition {
    transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1), transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .fade-out {
    opacity: 0;
    transform: scale(1.05);
    pointer-events: none;
  }

  body {
    min-height: max(884px, 100dvh);
    margin: 0;
    padding: 0;
  }
</style>

<body class="bg-background text-on-surface overflow-hidden m-0 p-0">
<!-- Shader Background -->
<div class="fixed inset-0 z-0">
  <div class="absolute inset-0 bg-gradient-to-b from-background/40 via-transparent to-background/40"></div>
</div>
<!-- Main Invitation Canvas -->
<main class="relative z-10 w-full h-screen flex flex-col items-center justify-center text-center px-margin-mobile md:px-margin-desktop animate-entrance page-transition overflow-hidden" id="invitation-screen">
  <!-- Botanical Accent (SVG Line Art Placeholder) -->
  <div class="absolute top-12 left-1/2 -translate-x-1/2 opacity-20 pointer-events-none hidden md:block">
    <svg class="text-primary" fill="none" height="120" stroke="currentColor" viewbox="0 0 100 100" width="120">
      <path d="M50 90C50 90 30 70 30 45C30 20 50 10 50 10C50 10 70 20 70 45C70 70 50 90 50 90Z" stroke-width="0.5"></path>
      <path d="M50 10V90" stroke-width="0.5"></path>
      <path d="M30 45C30 45 45 40 50 30" stroke-width="0.5"></path>
      <path d="M70 45C70 45 55 40 50 30" stroke-width="0.5"></path>
    </svg>
  </div>
  <!-- Content Container -->
  <div class="flex flex-col items-center gap-lg">
    <!-- Headline / Save the Date -->
    <div class="space-y-md animate-float">
      <p class="font-label-lg text-label-lg uppercase tracking-[0.4em] text-primary mb-4 opacity-80">
        Save the Date
      </p>
      <h1 class="font-display text-headline-lg-mobile md:text-display italic text-primary leading-tight">
        Claudia <span class="font-headline-sm not-italic align-middle mx-2">&amp;</span> Jacopo
      </h1>
    </div>
    <!-- Divider -->
    <div class="w-12 h-px bg-outline-variant/50"></div>
    <!-- Wedding Date -->
    <div class="space-y-sm animate-float-delayed">
      <p class="font-headline-sm md:text-headline-md text-headline-lg-mobile text-primary tracking-widest uppercase">
        12 Settembre 2025
      </p>
      <p class="font-body-md text-body-md text-outline italic">
        Sulle colline della Toscana
      </p>
    </div>
  </div>
  <!-- Call to Action Footer -->
  <div class="absolute bottom-16 left-0 w-full flex flex-col items-center justify-center animate-pulse-slow cursor-pointer">
    <div class="flex flex-col items-center gap-base">
      <span class="material-symbols-outlined text-outline text-[20px] mb-2">keyboard_double_arrow_down</span>
      <p class="font-label-sm text-label-sm uppercase tracking-[0.2em] text-outline/70">
        Clicca ovunque per entrare
      </p>
    </div>
  </div>
</main>
<!-- Interactive Layer Feedback -->
<div class="fixed inset-0 pointer-events-none z-50" id="click-feedback"></div>

<script>
  // Micro-interaction: Subtle ripple effect on click
  document.body.addEventListener('click', (e) => {
    const ripple = document.createElement('div');
    ripple.className = 'absolute rounded-full border border-primary/20 pointer-events-none transition-all duration-1000 ease-out';
    ripple.style.width = '20px';
    ripple.style.height = '20px';
    ripple.style.left = `${e.clientX - 10}px`;
    ripple.style.top = `${e.clientY - 10}px`;
    ripple.style.transform = 'scale(0)';
    
    document.getElementById('click-feedback').appendChild(ripple);
    
    requestAnimationFrame(() => {
      ripple.style.transform = 'scale(20)';
      ripple.style.opacity = '0';
    });

    setTimeout(() => ripple.remove(), 1000);
  });

  // Entrance animation enhancement
  window.addEventListener('load', () => {
    document.body.classList.add('opacity-100');
  });

  // Handle invitation screen interaction
  function transitionToHome() {
    try {
      localStorage.setItem('seen_invitation', '1');
    } catch (e) {
      // Storage might be disabled
    }
    const invite = document.getElementById('invitation-screen');
    invite.classList.add('fade-out');
    setTimeout(() => {
      location.href = 'homepage.html';
    }, 1500);
  }

  // Redirect to homepage if splash already seen
  (function() {
    try {
      const seen = localStorage.getItem('seen_invitation');
      const params = new URLSearchParams(location.search);
      if (params.get('reset_invite') === '1') {
        localStorage.removeItem('seen_invitation');
        return;
      }
      if (seen === '1') {
        location.replace('homepage.html');
      }
    } catch (e) {
      // Storage might be disabled
    }
  })();

  const invitationScreen = document.getElementById('invitation-screen');
  if (invitationScreen) {
    invitationScreen.addEventListener('click', transitionToHome, { once: true });
    invitationScreen.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        transitionToHome();
      }
    });
  }
</script>

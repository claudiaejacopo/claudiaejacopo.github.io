<!DOCTYPE html>
<html class="scroll-smooth" lang="it"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Claudia & Jacopo — Save the Date</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&amp;family=Montserrat:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
  tailwind.config = { darkMode: "class" };
</script>
<link rel="stylesheet" href="css/theme.css">
<style>
  body { margin:0; font-family: Montserrat, sans-serif; background:#fcf9f8; }
  .animate-fade-in{animation:fadeIn 2.2s cubic-bezier(.2,.8,.2,1) forwards}
  @keyframes fadeIn{from{opacity:0;transform:scale(.98)}to{opacity:1;transform:scale(1)}}
  .page-transition{transition:opacity 1.2s ease, transform 1.2s ease}
  .fade-out{opacity:0;transform:scale(1.03);pointer-events:none}
  .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400}
  main{min-height:100dvh}
</style>
</head>
<body class="bg-background text-on-surface overflow-hidden m-0 p-0">
<!-- Invitation splash (index) -->
<main id="invitation-screen" class="relative h-screen w-full flex items-center justify-center cursor-pointer page-transition overflow-hidden" role="button" tabindex="0">
  <div class="absolute inset-0 z-0">
    <div class="absolute inset-0 bg-gradient-to-b from-transparent via-background/20 to-background/40"></div>
  </div>
  <div class="relative z-10 flex flex-col items-center text-center px-6 animate-fade-in">
    <div class="mb-4"><span class="font-display text-6xl text-primary italic">C &amp; J</span></div>
    <div class="w-12 h-px bg-outline-variant/50 mb-4"></div>
    <h2 class="uppercase tracking-widest text-sm text-on-surface-variant mb-2">Save the Date</h2>
    <p class="text-3xl font-serif text-primary mb-4">12 Settembre 2025</p>
    <p class="text-base text-tertiary opacity-80">Sulle colline della Toscana</p>
    <div class="absolute bottom-12 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2 opacity-40 hover:opacity-100 transition-opacity duration-700">
      <p class="text-xs uppercase tracking-widest">Clicca ovunque per entrare</p>
      <span class="material-symbols-outlined animate-bounce">keyboard_double_arrow_down</span>
    </div>
  </div>
</main>

<script>
  // Redirect to homepage if splash already seen
  (function(){
    try{
      const seen = localStorage.getItem('seen_invitation');
      const params = new URLSearchParams(location.search);
      if (params.get('reset_invite') === '1') { localStorage.removeItem('seen_invitation'); return; }
      if (seen === '1') { location.replace('homepage.html'); }
    }catch(e){}
  })();

  function transitionToHome(){
    try{ localStorage.setItem('seen_invitation','1'); }catch(e){}
    const invite = document.getElementById('invitation-screen') || document.body;
    invite.classList.add('fade-out');
    setTimeout(()=>{ location.href = 'homepage.html'; }, 1200);
  }

  const el = document.getElementById('invitation-screen');
  el.addEventListener('click', transitionToHome, { once:true });
  el.addEventListener('keydown', (e)=>{ if(e.key==='Enter' || e.key===' ') transitionToHome(); });
</script>
</body>
</html>

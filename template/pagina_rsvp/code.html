<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        body {
            background-color: #fcf9f2;
            color: #1c1c18;
            -webkit-font-smoothing: antialiased;
        }
        .form-card {
            background: #f6f3ec;
            box-shadow: 0 4px 20px rgba(155, 63, 37, 0.04);
            border: 1px solid rgba(137, 114, 108, 0.1);
        }
        .custom-radio:checked + label {
            background-color: #7b5455; /* secondary color */
            color: #ffffff;
        }
        .input-focus:focus {
            outline: none;
            border-color: #9b3f25;
            box-shadow: 0 0 0 1px #9b3f25;
        }

    body {
      min-height: max(884px, 100dvh);

<body class="min-h-screen flex flex-col font-body-md">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-50 bg-surface dark:bg-surface-dim flex justify-center items-center px-margin-mobile md:px-margin-desktop py-4 transition-all duration-300 ease-in-out">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim" style="font-size: 28px;">local_florist</span>
<h1 class="font-headline-md text-headline-md text-primary dark:text-primary-fixed-dim tracking-tight">Edoardo & Alice</h1>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center px-margin-mobile md:px-margin-desktop py-stack-lg">
<div class="max-w-2xl w-full">
<!-- Welcome Header -->
<div class="text-center mb-stack-lg">
<h2 class="font-display-lg-mobile md:font-display-lg text-display-lg-mobile md:text-display-lg text-primary mb-2">Conferma la Presenza</h2>
<p class="font-headline-sm text-headline-sm text-on-surface-variant italic">Sarai dei nostri?</p>
<div class="mt-6 flex justify-center">
<span class="w-12 h-[1px] bg-outline-variant"></span>
<span class="material-symbols-outlined mx-4 text-outline-variant" style="font-size: 16px;">local_florist</span>
<span class="w-12 h-[1px] bg-outline-variant"></span>
</div>
</div>
<!-- RSVP Form Container -->
<form action="#" class="form-card rounded-xl p-8 md:p-12 space-y-stack-md transition-all" method="POST">
<!-- Nome e Cognome -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="name">Nome e Cognome</label>
<input class="w-full bg-surface border-b border-outline-variant py-3 px-1 text-body-lg focus:border-primary transition-colors focus:ring-0 placeholder:text-outline-variant/50" id="name" name="name" placeholder="Es. Mario Rossi" required="" type="text"/>
</div>
<!-- Presence Toggle (Attendance) -->
<div class="space-y-4 pt-4">
<p class="font-label-caps text-label-caps text-on-surface-variant">La tua risposta</p>
<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
<div class="relative">
<input checked="" class="hidden peer" id="attending" name="attendance" type="radio" value="yes"/>
<label class="flex items-center justify-center py-4 px-6 rounded-full border border-outline-variant text-on-surface-variant cursor-pointer transition-all peer-checked:bg-secondary peer-checked:text-on-secondary peer-checked:border-secondary hover:bg-surface-container-highest" for="attending">
<span class="material-symbols-outlined mr-2" style="font-variation-settings: 'FILL' 1;">favorite</span>
<span class="font-body-md font-semibold">Ci sarò</span>
</label>
</div>
<div class="relative">
<input class="hidden peer" id="not_attending" name="attendance" type="radio" value="no"/>
<label class="flex items-center justify-center py-4 px-6 rounded-full border border-outline-variant text-on-surface-variant cursor-pointer transition-all peer-checked:bg-outline peer-checked:text-white peer-checked:border-outline hover:bg-surface-container-highest" for="not_attending">
<span class="material-symbols-outlined mr-2">event_busy</span>
<span class="font-body-md font-semibold">Purtroppo no</span>
</label>
</div>
</div>
</div>
<!-- Dietary Notes -->
<div class="space-y-2 pt-4">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="notes">Intolleranze alimentari o note speciali</label>
<textarea class="w-full bg-surface border border-outline-variant rounded-xl p-4 text-body-md focus:border-primary focus:ring-1 focus:ring-primary transition-all resize-none placeholder:text-outline-variant/50" id="notes" name="notes" placeholder="Raccontaci se hai esigenze particolari o canzoni che vorresti sentire..." rows="4"></textarea>
</div>
<!-- Visual Detail (Botanical) -->
<div class="flex justify-center py-4">
<div class="w-24 h-24 bg-contain bg-no-repeat bg-center opacity-30" data-alt="A delicate, minimalist watercolor illustration of a dried olive branch and a dusty rose bud in the corner of a cream-colored high-quality paper background. The style is romantic and organic, featuring warm terracotta tones and soft ambient lighting that feels like a sun-drenched Mediterranean afternoon." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBB30zewXrLvWo27AWW9ld5ecUtynKA4hfbBl70AHQrhYfsa6j1XSUT-d2-d88i5Yg4YaRa4-cqUEM-swq1S-Ll1w_vEWphodJnpGW9xkcUqlY7pZnfNdjNhS5grklkwXL5cX432xo9QFfmlrkjCLlrxEABE24fIEtZQsv8cnvCxqF-hqPP38uS-fhpIPZn9Qyv2nap14WmMM69UTHtti-XGMXHF5jbHse5KwunqP1Hyj-7mnulPShqtxwvlhznAip5gENLYIHEUkKy')"></div>
</div>
<!-- Submit Button -->
<div class="pt-6">
<button class="w-full bg-primary text-on-primary py-5 rounded-full font-label-caps text-label-caps tracking-widest hover:opacity-90 active:scale-[0.98] transition-all shadow-md" type="submit">
                        INVIA CONFERMA
                    </button>
<p class="text-center text-[11px] text-outline mt-4 italic">Ti preghiamo di rispondere entro il 30 Maggio 2024</p>
</div>
</form>
<!-- Back navigation / Extra info -->
<div class="mt-stack-md text-center">
<a class="inline-flex items-center text-primary font-label-caps text-label-caps hover:underline gap-1" href="#">
<span class="material-symbols-outlined" style="font-size: 16px;">arrow_back</span>
                    Torna al sito principale
                </a>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 pb-safe bg-surface-container-low dark:bg-surface-container shadow-[0_-4px_12px_rgba(155,63,37,0.05)] md:hidden">
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant opacity-70 hover:bg-surface-container-highest transition-colors scale-95 active:scale-90" href="#">
<span class="material-symbols-outlined">favorite</span>
<span class="font-label-caps text-label-caps">Invito</span>
</a>
<a class="flex flex-col items-center justify-center bg-secondary-container dark:bg-secondary text-on-secondary-container dark:text-on-secondary rounded-full px-6 py-1 transition-transform scale-95 active:scale-90" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">edit_calendar</span>
<span class="font-label-caps text-label-caps">RSVP</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant opacity-70 hover:bg-surface-container-highest transition-colors scale-95 active:scale-90" href="#">
<span class="material-symbols-outlined">info</span>
<span class="font-label-caps text-label-caps">Dettagli</span>
</a>
</nav>
<!-- Desktop Nav Helper (Integrated in Shell) -->
<div class="hidden md:flex fixed right-margin-desktop top-1/2 -translate-y-1/2 flex-col gap-8 z-40">
<a class="group flex flex-col items-center gap-2" href="#">
<span class="w-1 h-1 rounded-full bg-outline group-hover:h-4 transition-all"></span>
<span class="font-label-caps text-[10px] uppercase rotate-90 origin-left ml-3 opacity-0 group-hover:opacity-100 transition-opacity">Invito</span>
</a>
<a class="group flex flex-col items-center gap-2" href="#">
<span class="w-1 h-8 rounded-full bg-primary transition-all"></span>
<span class="font-label-caps text-[10px] uppercase rotate-90 origin-left ml-3 text-primary">RSVP</span>
</a>
<a class="group flex flex-col items-center gap-2" href="#">
<span class="w-1 h-1 rounded-full bg-outline group-hover:h-4 transition-all"></span>
<span class="font-label-caps text-[10px] uppercase rotate-90 origin-left ml-3 opacity-0 group-hover:opacity-100 transition-opacity">Dettagli</span>
</a>
</div>
<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.querySelector('form');
            const submitBtn = form.querySelector('button[type="submit"]');

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                submitBtn.innerHTML = 'INVIO IN CORSO...';
                submitBtn.classList.add('opacity-50', 'pointer-events-none');
                
                // Simulate success
                setTimeout(() => {
                    form.innerHTML = `
                        <div class="text-center py-12 animate-fade-in">
                            <span class="material-symbols-outlined text-primary mb-4" style="font-size: 64px; font-variation-settings: 'FILL' 1;">check_circle</span>
                            <h3 class="font-headline-md text-headline-md text-primary mb-2">Grazie mille!</h3>
                            <p class="font-body-lg text-body-lg text-on-surface-variant">La tua conferma è stata ricevuta correttamente. Non vediamo l'ora di festeggiare insieme!</p>
                            <button onclick="window.location.reload()" class="mt-8 text-primary font-label-caps text-label-caps border-b border-primary">Torna indietro</button>
                        </div>
                    `;
                }, 1500);
            });
        });
    </script>
</body></html>
